title: Windows Event Log Cleared
id: a5b9c0d3-6e4f-4f1a-b8c5-d0e3f4a7b9c1
status: experimental
description: |
    Detects clearing of Windows event logs via EID 1102 (Security log cleared)
    and wevtutil.exe or PowerShell Clear-EventLog commands. This is a near-zero
    false positive detection in enterprise environments. Any occurrence should
    be treated as CRITICAL.
references:
    - https://attack.mitre.org/techniques/T1070/001/
    - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1070.001/T1070.001.md
author: Nityavardhan
date: 2024/01/01
tags:
    - attack.defense_evasion
    - attack.t1070.001
logsource:
    category: process_creation
    product: windows
detection:
    selection_wevtutil:
        Image|endswith: '\wevtutil.exe'
        CommandLine|contains:
            - ' cl '
            - ' clear-log '
    selection_powershell:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - 'Clear-EventLog'
            - 'Remove-EventLog'
            - 'wevtutil cl'
    condition: selection_wevtutil or selection_powershell
falsepositives:
    - IT staff clearing logs during documented maintenance (requires verification)
level: critical
