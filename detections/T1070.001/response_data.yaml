technique_id: T1070.001
technique_name: "Clear Windows Event Logs"
tactic: Defense Evasion
severity: CRITICAL
false_positive_risk: VERY_LOW

adversary_context: |
  After establishing persistence or completing objectives, attackers clear event
  logs to destroy forensic evidence and delay detection. EID 1102 (Security log
  cleared) and EID 104 (System log cleared) are generated when logs are wiped.
  Critically, these events appear IN the log at the moment of clearing — meaning
  even if an attacker clears the Security log, EID 1102 is written first.
  Common methods: wevtutil cl Security, wevtutil cl System,
  PowerShell Clear-EventLog, or direct registry manipulation.
  This is a near-zero false positive detection in enterprise environments.
  Any occurrence should be treated as CRITICAL until proven otherwise.
  Threat groups: Lazarus Group, APT38, many ransomware operators.

containment_steps: |
  1. Treat as active incident IMMEDIATELY — log clearing indicates attacker awareness
  2. The attacker likely knows they have been or will be discovered
  3. Isolate the host within 15 minutes of this alert firing
  4. Do not alert the user on the affected machine (attacker may be watching)
  5. Preserve all remaining logs from ALL systems on the network immediately
  6. Notify CISO and IR team leadership — this may indicate broader compromise

investigation_steps: |
  1. Identify WHO cleared the logs — EID 1102 contains SubjectUserName
  2. Check what time the logs were cleared vs. the attacker's known entry time
  3. The gap between entry and log clearing = minimum dwell time
  4. Pull logs from OTHER systems (domain controller, SIEM, firewall) for this host
  5. Review Sysmon EID 1 for wevtutil.exe or PowerShell with Clear-EventLog
  6. Check if log clearing was followed by new activity (attacker continuing post-cleanup)
  7. Look for vssadmin delete shadows (T1490) — often paired with log clearing

evidence_checklist: |
  - [ ] Remaining event log fragments (even partial logs have value)
  - [ ] Microsoft-Windows-Sysmon/Operational.evtx (often NOT cleared — attackers forget)
  - [ ] Domain Controller Security logs for authentication events from this host
  - [ ] Firewall/proxy logs for network activity from this host
  - [ ] SIEM data if logs were forwarded before clearing
  - [ ] Memory image (volatile data survives log clearing)
  - [ ] EID 1102 / 104 records themselves (timestamp and user who cleared)

remediation_steps: |
  1. Complete full incident investigation before remediation (don't lose evidence)
  2. Identify and close the initial access vector
  3. Remove all persistence mechanisms installed by the attacker
  4. Implement Windows Event Log forwarding to a SIEM/collector IMMEDIATELY
     (logs on a remote system cannot be cleared by a local attacker)
  5. Restrict wevtutil.exe execution via AppLocker to administrators only
  6. Alert on EID 1102/104 in your SIEM with CRITICAL priority

false_positive_scenarios: |
  1. IT staff clearing logs during routine maintenance or troubleshooting.
     Even if legitimate, this MUST be verified. Log clearing outside a change
     window should never be accepted without explanation.
  2. Automated scripts that clear logs for storage management (poor practice,
     should never occur in a properly configured environment).
     Tuning: Document any legitimate log clearing processes — there should be none.
  NOTE: This detection has near-zero acceptable false positives in a production
  environment. Every occurrence requires investigation.

compliance_notes: |
  NIST CSF:
    - PR.PT-1: Audit/log records are determined, documented, implemented, and reviewed
    - DE.CM-3: Personnel activity is monitored to detect potential cybersecurity events
    - RS.AN-1: Notifications from detection systems are investigated

  CIS Controls v8:
    - 8.2: Collect Audit Logs
    - 8.3: Ensure Adequate Audit Log Storage
    - 8.9: Centralize Audit Logs

  ISO 27001:
    - A.12.4.1: Event Logging
    - A.12.4.2: Protection of Log Information
    - A.12.4.3: Administrator and Operator Logs