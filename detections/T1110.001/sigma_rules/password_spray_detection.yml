title: Password Spraying via Multiple Failed Logons
id: a9b3c4d7-0e8f-4f5a-b2c9-d4e7f8a1b3ca
status: experimental
description: |
    Detects potential password spraying attacks by monitoring for multiple
    failed logon attempts (EID 4625) with status 0xC000006A (wrong password).
    A true spray would show the same source targeting different accounts,
    but this rule provides the base signal for SIEM correlation.
references:
    - https://attack.mitre.org/techniques/T1110/001/
author: Nityavardhan
date: 2024/01/01
tags:
    - attack.credential_access
    - attack.t1110.001
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 4625
        Status: '0xC000006A'
    filter_machine:
        TargetUserName|endswith: '$'
    condition: selection and not filter_machine
falsepositives:
    - Users mistyping passwords multiple times
    - Password policy changes causing bulk lockouts
    - Automated service accounts with expired credentials
level: medium
