title: PowerShell Encoded Command Execution
id: a3f7c8d1-4e2b-4f9a-b6c3-d8e1f2a5b7c4
status: experimental
description: |
    Detects execution of PowerShell with the -EncodedCommand parameter or its
    common abbreviations (-enc, -e, -ec). This is one of the most common
    obfuscation techniques used by threat actors to hide malicious commands.
references:
    - https://attack.mitre.org/techniques/T1059/001/
    - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1059.001/T1059.001.md
author: Nityavardhan
date: 2024/01/01
tags:
    - attack.execution
    - attack.t1059.001
logsource:
    category: process_creation
    product: windows
detection:
    selection_img:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
    selection_cli:
        CommandLine|contains:
            - '-EncodedCommand'
            - '-enc '
            - '-ec '
            - '-e '
    condition: selection_img and selection_cli
falsepositives:
    - Legitimate admin scripts using encoded commands for automation
    - Software installers that use PowerShell with -EncodedCommand
    - SCCM and Intune deployment scripts
level: high
