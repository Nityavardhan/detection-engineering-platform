title: System Information Discovery Command Cluster
id: e3f7a8b1-4c2d-4d9e-f6a3-b8c1d2e5f7a9
status: experimental
description: |
    Detects execution of common system discovery commands (systeminfo, whoami,
    hostname, net, ipconfig) that are frequently run in rapid succession by
    threat actors during initial reconnaissance after compromise.
references:
    - https://attack.mitre.org/techniques/T1082/
author: Nityavardhan
date: 2024/01/01
tags:
    - attack.discovery
    - attack.t1082
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\systeminfo.exe'
            - '\whoami.exe'
            - '\hostname.exe'
            - '\ipconfig.exe'
            - '\net.exe'
            - '\net1.exe'
            - '\nltest.exe'
            - '\dsquery.exe'
    condition: selection
falsepositives:
    - System administrators running diagnostic commands
    - Monitoring and inventory tools executing discovery commands
    - Login scripts that run system info commands
level: medium
