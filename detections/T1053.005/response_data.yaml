technique_id: T1053.005
technique_name: "Scheduled Task/Job: Scheduled Task"
tactic: Persistence
severity: HIGH
false_positive_risk: MEDIUM

adversary_context: |
  Attackers create scheduled tasks to maintain persistent access to compromised
  systems across reboots. This technique is used extensively by both commodity
  malware and APT groups including APT29 (HAMMERTOSS scheduler), FIN7 (for
  recurring C2 beacon callbacks), and Lazarus Group. The evasion goal is to
  blend persistence into the hundreds of legitimate scheduled tasks on a
  typical Windows system.

containment_steps: |
  1. Disable the suspicious scheduled task immediately:
     schtasks /change /tn "TaskName" /disable
  2. Record the full task XML for evidence before deletion:
     schtasks /query /tn "TaskName" /xml > evidence_task.xml
  3. Isolate the host if the task action points to C2 or lateral movement
  4. Check for additional persistence mechanisms installed by the same account
  5. Block the network destinations referenced in the task action

investigation_steps: |
  1. Review EID 4698 (TaskRegistered) — check SubjectUserName and TaskContent XML
  2. Parse the task XML to identify: action (command/script), trigger (schedule),
     and run-as account (principal)
  3. Check EID 106 (Task Scheduler operational log) for task registration history
  4. Review Sysmon EID 1 for schtasks.exe execution — check parent process chain
  5. Search for lateral movement: was this task created remotely via /S flag?
  6. Cross-reference the task action executable with known-good software inventory

evidence_checklist: |
  - [ ] Task Scheduler operational log (EID 106, 200, 201)
  - [ ] Security log (EID 4698 — task creation with full XML)
  - [ ] Sysmon EID 1 — schtasks.exe process creation with command line
  - [ ] Exported task XML (schtasks /query /xml)
  - [ ] Parent process tree of schtasks.exe execution
  - [ ] Network connections from the task action executable

remediation_steps: |
  1. Delete the malicious scheduled task:
     schtasks /delete /tn "TaskName" /f
  2. Remove the executable or script referenced in the task action
  3. Audit all scheduled tasks on the host for additional unauthorized entries:
     schtasks /query /fo CSV > all_tasks.csv
  4. If remote creation detected, investigate the source host
  5. Implement AppLocker policies to restrict schtasks.exe usage to administrators

false_positive_scenarios: |
  1. Software installers creating legitimate update tasks during installation.
     Tuning: Maintain an allowlist of known-good task names and publishers.
  2. IT automation tools (SCCM, Ansible) creating maintenance tasks.
     Tuning: Exclude known automation service accounts.
  3. Windows Update and Defender creating their own scheduled tasks.
     Tuning: Exclude tasks under \Microsoft\ path with Microsoft publisher.

compliance_notes: |
  NIST CSF: DE.CM-3 — Personnel activity is monitored
  NIST CSF: PR.AC-4 — Access permissions are managed
  CIS Controls v8: 8.2 — Collect Audit Logs
  CIS Controls v8: 5.4 — Restrict Administrator Privileges
  ISO 27001: 8.15 — Logging
  ISO 27001: 8.16 — Monitoring Activities
