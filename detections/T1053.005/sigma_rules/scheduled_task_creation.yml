title: Scheduled Task Creation via schtasks.exe
id: c5d9e0f3-6a4b-4b1c-d8e5-f0a3b4c7d9e6
status: experimental
description: |
    Detects creation of scheduled tasks via schtasks.exe with suspicious arguments
    such as execution from temp directories, PowerShell in the task action, or
    tasks running as SYSTEM. Scheduled tasks are a common persistence mechanism.
references:
    - https://attack.mitre.org/techniques/T1053/005/
    - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1053.005/T1053.005.md
author: Nityavardhan
date: 2024/01/01
tags:
    - attack.persistence
    - attack.execution
    - attack.t1053.005
logsource:
    category: process_creation
    product: windows
detection:
    selection_img:
        Image|endswith: '\schtasks.exe'
    selection_create:
        CommandLine|contains: '/create'
    selection_suspicious:
        CommandLine|contains:
            - '\AppData\Local\Temp'
            - '\Users\Public'
            - 'powershell'
            - 'cmd.exe /c'
            - 'mshta'
            - 'wscript'
            - 'cscript'
            - 'SYSTEM'
    condition: selection_img and selection_create and selection_suspicious
falsepositives:
    - Legitimate software installers creating scheduled tasks
    - IT admin scripts for maintenance automation
    - Windows Update related scheduled tasks
level: high
