title: File and Directory Discovery Commands
id: d2e6f7a0-3b1c-4c8d-e5f2-a7b0c1d4e6f8
status: experimental
description: |
    Detects execution of common file and directory discovery commands such as
    dir, tree, and Get-ChildItem with recursive flags targeting sensitive paths.
    These commands are frequently used by attackers during post-compromise
    reconnaissance.
references:
    - https://attack.mitre.org/techniques/T1083/
author: Nityavardhan
date: 2024/01/01
tags:
    - attack.discovery
    - attack.t1083
logsource:
    category: process_creation
    product: windows
detection:
    selection_cmd:
        Image|endswith:
            - '\cmd.exe'
        CommandLine|contains:
            - 'dir /s'
            - 'dir /a'
            - 'dir /b /s'
    selection_tree:
        Image|endswith: '\tree.com'
    selection_ps:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - 'Get-ChildItem'
            - 'gci '
            - 'ls -'
            - 'dir -Recurse'
    condition: selection_cmd or selection_tree or selection_ps
falsepositives:
    - System administrators performing legitimate file audits
    - Backup software scanning directories for file selection
    - Inventory and compliance scanning tools
level: medium
