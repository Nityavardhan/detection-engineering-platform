title: Office Application Spawning Shell Process
id: d8e2f3a6-9b7c-4c4d-e1f8-a3b6c7d0e2f4
status: experimental
description: |
    Detects Microsoft Office applications (Word, Excel, Outlook, PowerPoint)
    spawning command shells (cmd.exe, powershell.exe, wscript.exe, cscript.exe).
    This parent-child relationship is a near-zero false positive indicator of
    successful spearphishing macro execution.
references:
    - https://attack.mitre.org/techniques/T1566/001/
    - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1566.001/T1566.001.md
author: Nityavardhan
date: 2024/01/01
tags:
    - attack.initial_access
    - attack.t1566.001
logsource:
    category: process_creation
    product: windows
detection:
    selection_parent:
        ParentImage|endswith:
            - '\WINWORD.EXE'
            - '\EXCEL.EXE'
            - '\POWERPNT.EXE'
            - '\OUTLOOK.EXE'
            - '\MSPUB.EXE'
            - '\VISIO.EXE'
    selection_child:
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
            - '\wscript.exe'
            - '\cscript.exe'
            - '\mshta.exe'
            - '\certutil.exe'
            - '\regsvr32.exe'
    condition: selection_parent and selection_child
falsepositives:
    - Very few legitimate scenarios for Office spawning command shells
    - Some legacy Office add-ins may trigger this
level: critical
