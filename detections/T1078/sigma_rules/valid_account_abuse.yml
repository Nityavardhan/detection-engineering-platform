title: Valid Account Abuse - Anomalous Logon Pattern
id: e7f1a2b5-8c6d-4d3e-f0a7-b2c5d6e9f1a8
status: experimental
description: |
    Detects anomalous logon patterns that may indicate valid account abuse.
    Focuses on network logons (type 3) combined with special privilege
    assignment (EID 4672) which may indicate credential theft and lateral
    movement using legitimate accounts.
references:
    - https://attack.mitre.org/techniques/T1078/
author: Nityavardhan
date: 2024/01/01
tags:
    - attack.defense_evasion
    - attack.persistence
    - attack.t1078
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 4672
    filter_system:
        SubjectUserName|endswith: '$'
    filter_known:
        SubjectUserName:
            - 'SYSTEM'
            - 'LOCAL SERVICE'
            - 'NETWORK SERVICE'
    condition: selection and not filter_system and not filter_known
falsepositives:
    - Legitimate administrator logons during business hours
    - Service accounts performing expected privileged operations
    - Domain admin logons during maintenance windows
level: medium
